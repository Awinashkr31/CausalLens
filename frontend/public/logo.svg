<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="transparent" />

  <g transform="translate(100, 100)" filter="url(#shadow)">
    <!-- Base Node -->
    <circle cx="64" cy="156" r="48" fill="url(#primaryGrad)" />
    
    <!-- Connected Node 1 -->
    <circle cx="248" cy="64" r="40" fill="url(#accentGrad)" />
    
    <!-- Connected Node 2 (Focus) -->
    <circle cx="248" cy="248" r="64" fill="url(#primaryGrad)" />
    
    <!-- Connecting Lines -->
    <path d="M 104 132 L 214 84" stroke="#94a3b8" stroke-width="12" stroke-linecap="round" />
    <path d="M 104 180 L 194 220" stroke="#94a3b8" stroke-width="12" stroke-linecap="round" />
    <path d="M 230 200 L 210 210" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" />
    
    <!-- Focus Reticle around Node 2 -->
    <circle cx="248" cy="248" r="88" fill="none" stroke="#10b981" stroke-width="8" stroke-dasharray="24 16" />
  </g>
</svg>
